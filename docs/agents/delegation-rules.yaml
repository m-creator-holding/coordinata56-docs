# coordinata56 — формальные правила делегации
# Версия: 1.0
# Дата: 2026-04-16
# Источник: regulations_addendum_v1.6.md §11 + прямое указание Владельца (msg 754)
#
# СМЫСЛ ФАЙЛА.
# Разделяем ЛОГИЧЕСКИЕ связи между агентами (кто кому подчиняется, кто кого
# может попросить привлечь) от ТЕХНИЧЕСКОГО запуска (все subagents в Claude
# Code физически запускаются main-orchestrator'ом — Координатором).
#
# ПОЛЯ СВЯЗЕЙ:
#   reports_to     — агент, которому логически подчиняется (L4→L3, L3→L2, L2→L1)
#   can_request    — агентов, которых может попросить привлечь (через оркестратор)
#   reviewed_by    — кто проверяет результат (первичное + финальное ревью)
#   handoff_to     — куда передаётся результат после приёмки
#   spawned_by     — кто технически запускает (для subagents это всегда main-orchestrator)
#   main_session_capable — может ли быть запущен как `claude --agent <id>`
#                          с собственным Agent-tool (тогда CAN spawn subagents)
#
# ИСКЛЮЧЕНИЯ ИЗ ЦЕПОЧКИ.
# Советники (staff, architect, analyst, legal, construction-expert,
# tech-writer, memory-keeper, tutor, data-analyst) — вне вертикали.
# Координатор обращается к ним напрямую без reports_to.

meta:
  version: "1.0"
  date: "2026-04-16"
  main_orchestrator: coordinator
  approved_by: owner
  ref_regulation: docs/agents/regulations_addendum_v1.6.md

# ========================= L0 =========================
