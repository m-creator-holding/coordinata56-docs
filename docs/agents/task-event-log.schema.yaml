# coordinata56 — Схема событий живой паутины делегации
# Версия: 1.0
# Дата: 2026-04-16
# Источник: прямое указание Владельца (Telegram msg 754)
#
# ЗАЧЕМ.
# Поток работы системы агентов должен быть честно отражён в событиях:
# логическая делегация отделена от технического запуска; дашборд рисует
# иерархию (director → scout), но в подробностях каждого события видно,
# что реально spawned_by — main-orchestrator.

meta:
  version: "1.0"
  date: "2026-04-16"
  main_orchestrator: coordinator
  persisted_to:
    - /root/coordinata56/dashboard/live_status.json  # live (последние 200 событий)
    - /root/coordinata56/docs/knowledge/event_logs/YYYY-MM-DD.ndjson  # archive (append-only)

# ============== ОБЩИЕ ПОЛЯ ВСЕХ СОБЫТИЙ ==============
common_fields:
  event_id:
    type: string
    required: true
    description: "Уникальный идентификатор события. Формат: `evt_<timestamp>_<random>`"
  event_type:
    type: string
    required: true
    enum: [
      task_created,
      delegation_requested,
      agent_spawned,
      result_returned,
      review_requested,
      review_completed,
      memory_written,
      user_reported,
    ]
  ts:
    type: string
    required: true
    description: ISO 8601 UTC
  task_id:
    type: string
    required: true
    description: ID корневой задачи (все события одной задачи несут один task_id)
  chain_depth:
    type: integer
    required: false
    description: Глубина в логической иерархии (0 — Координатор, 1 — Директор, 2 — Head, 3 — Worker)
  correlation_id:
    type: string
    required: false
    description: Для связи request↔response (delegation_requested ↔ agent_spawned ↔ result_returned)

# ============== 8 ТИПОВ СОБЫТИЙ ==============

events:

  # ---- 1. Получена задача от Владельца ----
  task_created:
    description: Координатор получил задачу от Владельца (Telegram) или от внутреннего триггера
    fields:
      source:
        type: string
        enum: [telegram, cron, webhook, internal]
      source_ref:
        type: string
        description: Например telegram_msg_731 или cron_weekly-digest
      task_text:
        type: string
        description: Формулировка задачи от источника (цитата)
      tier:
        type: string
        enum: [XS, S, M, L]
        description: Определён Координатором
      direction:
        type: string
        description: backend/quality/governance/research/frontend/design/infrastructure/legal
      classified_by: coordinator
    example:
      event_id: evt_1713262800_abc1
      event_type: task_created
      ts: "2026-04-16T10:20:00Z"
      task_id: task_2026-04-16-ri-findings
      source: telegram
      source_ref: telegram_msg_731
      task_text: "проверь свежие находки"
      tier: S
      direction: research
      classified_by: coordinator

  # ---- 2. Логический запрос делегации ----
  delegation_requested:
    description: Агент (уровня N) выдаёт запрос на привлечение другого агента. Сам НЕ запускает — возвращает запрос Координатору.
    fields:
      requested_by:
        type: string
        description: Логический инициатор (например backend-director)
      requested_from:
        type: string
        description: Если есть — директор из чужой вертикали, к которому логически обратились
      target_agent:
        type: string
        description: Кого просят привлечь (например backend-head)
      brief:
        type: string
        description: Текст брифа — дословный, Координатор передаёт как есть
      files_allowed:
        type: array
        items: string
        description: Границы файлов для target_agent
      files_forbidden:
        type: array
        items: string
      dod:
        type: string
        description: Критерии готовности
      reason:
        type: string
        description: "Коротко: зачем делегация"
    example:
      event_id: evt_1713262820_def2
      event_type: delegation_requested
      ts: "2026-04-16T10:20:20Z"
      task_id: task_2026-04-16-ri-findings
      correlation_id: chain_01
      chain_depth: 1
      requested_by: ri-director
      target_agent: ri-scout
      brief: "Проверь за 2-3 дня источники: GitHub Trending, Anthropic release notes, Simon Willison. Верни до 5 находок, релевантных нашему стеку..."
      dod: "До 5 новых строк в findings.md + мини-бриф по каждой простым русским"

  # ---- 3. Технический запуск агента ----
  agent_spawned:
    description: Координатор (main-orchestrator) физически вызвал субагента через Agent tool
    fields:
      spawned_by:
        type: string
        description: Всегда `coordinator` в текущей архитектуре
      target_agent:
        type: string
        description: id вызванного субагента
      requested_by:
        type: string
        description: Кто логически попросил (берётся из предшествующего delegation_requested.requested_by)
      session_id:
        type: string
        description: Для Claude Code — internal session; для Managed Agents — API session id
      model:
        type: string
        enum: [claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5]
    example:
      event_id: evt_1713262830_ghi3
      event_type: agent_spawned
      ts: "2026-04-16T10:20:30Z"
      task_id: task_2026-04-16-ri-findings
      correlation_id: chain_01
      chain_depth: 2
      spawned_by: coordinator
      target_agent: ri-scout
      requested_by: ri-director
      model: claude-sonnet-4-6

  # ---- 4. Возврат результата ----
  result_returned:
    description: Субагент завершил работу, Координатор получил результат
    fields:
      from_agent:
        type: string
        description: Кто вернул результат
      to_agent:
        type: string
        description: Кому результат логически адресован (обычно = requested_by предыдущей делегации)
      status:
        type: string
        enum: [success, failure, partial, timeout]
      summary:
        type: string
        description: Короткая выжимка результата (≤200 символов)
      artifacts:
        type: array
        items: string
        description: Файлы/ссылки, которые создал агент
      duration_ms:
        type: integer
      usage:
        type: object
        description: { input_tokens, output_tokens, cache_read, cost_estimate_usd }
    example:
      event_id: evt_1713263080_jkl4
      event_type: result_returned
      ts: "2026-04-16T10:24:40Z"
      task_id: task_2026-04-16-ri-findings
      correlation_id: chain_01
      from_agent: ri-scout
      to_agent: ri-director
      status: success
      summary: "5 новых находок, 3 релевантны"
      artifacts:
        - docs/research/findings.md
        - docs/research/briefs/superpowers.md
      duration_ms: 250000

  # ---- 5. Запрос на ревью ----
  review_requested:
    description: Результат передан на ревью (обычно от Координатора к Директору или Head)
    fields:
      requested_by:
        type: string
        description: Кто запросил ревью (обычно coordinator)
      reviewer_agent:
        type: string
        description: Кто проверяет (backend-head, review-head, reviewer, security, ...)
      target_result:
        type: string
        description: event_id результата, который проверяется
      scope:
        type: string
        description: Что именно проверить (по брифу / DoD / ADR / security)
    example:
      event_id: evt_1713263100_mno5
      event_type: review_requested
      ts: "2026-04-16T10:25:00Z"
      task_id: task_2026-04-16-ri-findings
      correlation_id: chain_01
      requested_by: coordinator
      reviewer_agent: ri-director
      target_result: evt_1713263080_jkl4

  # ---- 6. Ревью завершено ----
  review_completed:
    description: Ревьюер вынес вердикт
    fields:
      reviewer_agent:
        type: string
      verdict:
        type: string
        enum: [approve, request-changes, reject]
      findings:
        type: array
        items:
          priority: { type: string, enum: [P0, P1, P2, P3] }
          description: string
      notes:
        type: string
    example:
      event_id: evt_1713263210_pqr6
      event_type: review_completed
      ts: "2026-04-16T10:26:50Z"
      task_id: task_2026-04-16-ri-findings
      correlation_id: chain_01
      reviewer_agent: ri-director
      verdict: approve
      findings: []
      notes: "Все 3 находки корректно классифицированы, брифы на русском"

  # ---- 7. Запись в память ----
  memory_written:
    description: Memory-keeper (или Координатор по v1.2 §A4.7) записал значимую запись в память
    fields:
      writer:
        type: string
        enum: [memory-keeper, coordinator]
      memory_type:
        type: string
        enum: [user, feedback, project, reference]
      file_path:
        type: string
        description: Путь к memory-файлу
      action:
        type: string
        enum: [create, update, archive]
    example:
      event_id: evt_1713263300_stu7
      event_type: memory_written
      ts: "2026-04-16T10:28:20Z"
      task_id: task_2026-04-16-ri-findings
      writer: coordinator
      memory_type: project
      file_path: /root/.claude/projects/-root/memory/project_tasks_log.md
      action: update

  # ---- 8. Отчёт Владельцу ----
  user_reported:
    description: Координатор отчитался Владельцу (Telegram)
    fields:
      channel:
        type: string
        enum: [telegram, email]
      message_id:
        type: string
      summary_headline:
        type: string
      links:
        type: array
        items: string
        description: Ссылки на артефакты/коммиты/ADR
    example:
      event_id: evt_1713263400_vwx8
      event_type: user_reported
      ts: "2026-04-16T10:30:00Z"
      task_id: task_2026-04-16-ri-findings
      channel: telegram
      message_id: telegram_msg_752
      summary_headline: "R&I: 3 новых находки, 1 в работе у analyst"
      links:
        - https://github.com/m-creator-holding/coordinata56/commit/b13f39d
        - docs/research/findings.md

# ============== ТРАНСПОРТ ==============

transport:
  live:
    format: JSON object
    path: /root/coordinata56/dashboard/live_status.json
    field: events[]
    max_size: 200 events (ring buffer)
    write_trigger: Hook PostToolUse (для agent_spawned + result_returned), explicit API для остальных типов
  archive:
    format: NDJSON (one event per line)
    path: /root/coordinata56/docs/knowledge/event_logs/YYYY-MM-DD.ndjson
    rotation: daily
    retention: 30 days (после можно архивировать в cold-storage)
  dashboard_consumption:
    field_priority:
      primary: requested_by, target_agent, event_type
      detail_panel: spawned_by, session_id, correlation_id, usage
    visualization:
      logical: paint edge requested_by → target_agent (иерархическая паутина)
      technical: paint edge spawned_by → target_agent (всегда coordinator → X)
      toggle: кнопка «логическая / техническая» переключает вид
